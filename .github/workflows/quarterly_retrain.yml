name: Quarterly Retrain Check

on:
  schedule:
    - cron: '0 14 2 1 *'   # Jan 2
    - cron: '0 14 1 4 *'   # Apr 1
    - cron: '0 14 1 7 *'   # Jul 1
    - cron: '0 14 1 10 *'  # Oct 1
  workflow_dispatch:
    inputs:
      force_issue:
        description: "Force create issue even if healthy"
        required: false
        default: "false"

permissions:
  contents: read
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
      count:  ${{ steps.set.outputs.count }}
    steps:
      - uses: actions/checkout@v4
      - run: pip install -q pyyaml
      - id: set
        run: |
          python - <<'PY' >> $GITHUB_OUTPUT
          import yaml, json
          data = yaml.safe_load(open("models.yaml"))
          enabled = [m for m in data["models"] if m.get("enabled", True)]
          rows = [{"id": m["id"], "name": m.get("name", m["id"])} for m in enabled]
          print(f"matrix={json.dumps({'include': rows})}")
          print(f"count={len(rows)}")
          PY

  quarterly_check:
    name: Quarterly check ${{ matrix.id }}
    needs: setup
    if: needs.setup.outputs.count != '0'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -q yfinance pandas numpy

      - name: Run signal monitor (90-day lookback)
        id: monitor
        run: |
          python scripts/signal_monitor.py --model-id ${{ matrix.id }} --days 90 2>&1 || true
          STATUS_FILE="logs/${{ matrix.id }}/health/health_status.json"
          if [ -f "$STATUS_FILE" ]; then
            STATUS=$(python3 -c "import json; print(json.load(open('$STATUS_FILE')).get('overall_status','unknown'))")
          else
            STATUS="unknown"
          fi
          echo "health_status=$STATUS" >> $GITHUB_OUTPUT

      - name: Build issue body
        run: |
          STATUS_FILE="logs/${{ matrix.id }}/health/health_status.json"
          python3 - <<PY > /tmp/issue_body.md
          import json, os
          d = json.load(open("$STATUS_FILE")) if os.path.exists("$STATUS_FILE") else {}
          status = d.get("overall_status", "unknown").upper()
          alerts = d.get("alerts", [])
          alerts_md = "\n".join(f"- ⚠️ {a}" for a in alerts) if alerts else "_(none)_"
          print(f"""## Quarterly Retraining Review — \`${{ matrix.id }}\` (${{ matrix.name }})

          **Current health (90-day):** {status}

          **Alerts:**
          {alerts_md}

          ### Quarterly retraining checklist for \`${{ matrix.id }}\`

          - [ ] Open \`vision_ichimoku_agentic.py\` in Colab
          - [ ] Roll \`CONFIG\` dates forward:
                - Train end → ~18 months ago
                - Validation end → ~3 months ago
                - Test start → 3 months ago
          - [ ] Run all cells (4–8 hours on a T4 GPU)
          - [ ] Verify validation Sharpe beats benchmarks
          - [ ] Replace \`artifacts/${{ matrix.id }}/agent.zip\` + \`metadata.json\`
          - [ ] Confirm \`action_names\` and \`action_specs\` match the previous metadata
          - [ ] Run a dry-run via Actions → Daily Paper Trader → \`only_model=${{ matrix.id }}\`, \`dry_run=true\`
          - [ ] Sanity-check the dry-run target weights
          - [ ] Run live (\`dry_run=false\`)
          - [ ] Close this issue

          *Auto-created by quarterly schedule.*
          """)
          PY

      - name: Create quarterly issue
        if: steps.monitor.outputs.health_status == 'degraded' || steps.monitor.outputs.health_status == 'warning' || github.event.inputs.force_issue == 'true' || github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('/tmp/issue_body.md', 'utf8');
            const modelId = '${{ matrix.id }}';
            const date = new Date().toISOString().slice(0, 10);
            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title: `📅 Quarterly Retrain [${modelId}] — ${date}`,
              body: body,
              labels: ['model-health', 'quarterly-review', `model:${modelId}`],
            });
