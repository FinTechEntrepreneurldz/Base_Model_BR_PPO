name: Daily Paper Trader

on:
  schedule:
    - cron: '35 12 * * 1-5'   # Mon–Fri 13:00 UTC = 9:00 AM ET
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (do NOT submit orders)"
        required: false
        default: "false"  
        type: choice
        options: ["true", "false"]
      only_model:
        description: "Run only this model_id (leave blank for all)"
        required: false
        default: ""
        type: string

permissions:
  contents: write
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ──────────────────────────────────────────────────────────────────
  # 1. Build dynamic matrix from models.yaml
  # ──────────────────────────────────────────────────────────────────
  setup:
    name: Build model matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
      count:  ${{ steps.set.outputs.count }}
    steps:
      - uses: actions/checkout@v4
      - name: Install pyyaml
        run: pip install -q pyyaml
      - id: set
        env:
          ONLY_MODEL: ${{ github.event.inputs.only_model }}
        run: |
          python - <<'PY' >> $GITHUB_OUTPUT
          import yaml, json, os
          with open("models.yaml") as f:
              data = yaml.safe_load(f)
          only = os.environ.get("ONLY_MODEL", "").strip()
          # Only trade models that live in THIS repo (or have no `repo` field).
          # Models B and C live in separate repos with their own daily workflows
          # and are explicitly skipped here so the matrix doesn't try to trade
          # them (and crash on missing `environment` field).
          this_repo = "FinTechEntrepreneurldz/Base_Model_BR_PPO"
          enabled = [
              m for m in data["models"]
              if m.get("enabled", True)
              and (not m.get("repo") or m["repo"] == this_repo)
          ]
          if only:
              enabled = [m for m in enabled if m["id"] == only]
          # Each model in this repo MUST declare its own `environment` for
          # GitHub Environment-scoped Alpaca secrets.
          rows = [
              {"id": m["id"], "environment": m.get("environment") or m["id"]}
              for m in enabled
          ]
          print(f"matrix={json.dumps({'include': rows})}")
          print(f"count={len(rows)}")
          PY
      - run: |
          echo "Will run ${{ steps.set.outputs.count }} model(s):"
          echo '${{ steps.set.outputs.matrix }}' | python -m json.tool

  # ──────────────────────────────────────────────────────────────────
  # 2. Trade — one parallel matrix job per enabled model
  # ──────────────────────────────────────────────────────────────────
  trade:
    name: Trade ${{ matrix.id }}
    needs: setup
    if: needs.setup.outputs.count != '0'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
    environment: ${{ matrix.environment }}    # ← scoped Alpaca secrets per model

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -q -r requirements.txt

      - name: Check trading day
        id: market_check
        run: python scripts/market_check.py --info
        continue-on-error: true

      - name: Skip on non-trading day
        if: steps.market_check.outcome == 'failure'
        run: |
          echo "Today is not a NYSE trading day. Skipping ${{ matrix.id }}."
          exit 0

      - name: Sanity-check model files exist
        run: |
          test -f artifacts/${{ matrix.id }}/agent.zip      || (echo "Missing artifacts/${{ matrix.id }}/agent.zip"      && exit 1)
          test -f artifacts/${{ matrix.id }}/metadata.json  || (echo "Missing artifacts/${{ matrix.id }}/metadata.json"  && exit 1)

      - name: Run BR-PPO paper trader for ${{ matrix.id }}
        env:
          ALPACA_API_KEY:                   ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY:                ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_PAPER:                     "True"
          BRPPO_SUBMIT_ORDERS:              ${{ github.event.inputs.dry_run == 'true' && 'False' || 'True' }}
          BRPPO_PROJECT_ROOT:               "."
          BRPPO_MODEL_ID:                   ${{ matrix.id }}
          BRPPO_MODEL_PATH:                 "./artifacts/${{ matrix.id }}/agent.zip"
          BRPPO_METADATA_PATH:              "./artifacts/${{ matrix.id }}/metadata.json"
          BRPPO_LOG_DIR:                    "./logs/${{ matrix.id }}"
          BRPPO_MIN_TRADE_DOLLARS:          "25"
          BRPPO_MAX_POSITION_WEIGHT:        "0.20"
          BRPPO_MAX_GROSS_EXPOSURE:         "1.00"
          BRPPO_CASH_BUFFER_PCT:            "0.02"
          BRPPO_REBALANCE_THRESHOLD_WEIGHT: "0.005"
          BRPPO_DATA_PERIOD:                "3y"
          BRPPO_V6_MAX_NAMES:               "30"
        run: python paper_trader.py

      - name: Run signal monitor
        id: health
        run: |
          python scripts/signal_monitor.py --model-id ${{ matrix.id }} --days 63 2>&1 || true
          STATUS_FILE="logs/${{ matrix.id }}/health/health_status.json"
          if [ -f "$STATUS_FILE" ]; then
            STATUS=$(python3 -c "import json; print(json.load(open('$STATUS_FILE')).get('overall_status','unknown'))")
            TRAINING=$(python3 -c "import json; print('1' if json.load(open('$STATUS_FILE')).get('training_recommended') else '0')")
          else
            STATUS="unknown"; TRAINING="0"
          fi
          echo "health_status=$STATUS" >> $GITHUB_OUTPUT
          echo "training_recommended=$TRAINING" >> $GITHUB_OUTPUT
          echo "[${{ matrix.id }}] health: $STATUS  (training_recommended=$TRAINING)"

      - name: Build issue body for degraded model
        if: steps.health.outputs.health_status == 'degraded'
        run: |
          STATUS_FILE="logs/${{ matrix.id }}/health/health_status.json"
          python3 - <<PY > /tmp/issue_body.md
          import json, os
          d = json.load(open("$STATUS_FILE"))
          alerts = d.get("alerts", [])
          alerts_md = "\n".join(f"- ⚠️ {a}" for a in alerts) if alerts else "_(none)_"
          print(f"""## Model Health Alert — \`${{ matrix.id }}\`

          **Status:** DEGRADED
          **Model ID:** ${{ matrix.id }}

          **Alerts:**
          {alerts_md}

          **Action required:** Retrain this model. See the Model Health tab in the Streamlit dashboard, filtered to \`${{ matrix.id }}\`.

          **To retrain:**
          1. Open the Colab notebook (\`vision_ichimoku_agentic.py\`)
          2. Update \`CONFIG\` dates to roll training window forward
          3. Run all cells, save model files
          4. Replace \`artifacts/${{ matrix.id }}/agent.zip\` and \`artifacts/${{ matrix.id }}/metadata.json\`
          5. Push to main — next daily run uses the new model

          *Auto-created by daily trading workflow.*
          """)
          PY

      - name: Create issue if degraded (per-model)
        if: steps.health.outputs.health_status == 'degraded'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('/tmp/issue_body.md', 'utf8');
            const modelId = '${{ matrix.id }}';
            const titleTag = `BR-PPO Health [${modelId}]`;
            const open = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: 'model-health',
            });
            const existing = open.data.find(i => i.title.includes(titleTag));
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: existing.number,
                body: '**New degraded check:**\n\n' + body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title: `🚨 ${titleTag} — DEGRADED, retraining needed`,
                body: body,
                labels: ['model-health', 'automated', `model:${modelId}`],
              });
            }

      - name: Upload per-model logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ matrix.id }}-${{ github.run_id }}
          path: logs/${{ matrix.id }}/
          retention-days: 90

  # ──────────────────────────────────────────────────────────────────
  # 3. Commit all logs in a single follow-up job (avoids matrix conflicts)
  # ──────────────────────────────────────────────────────────────────
  commit-logs:
    name: Commit aggregated logs
    needs: trade
    if: always() && needs.trade.result != 'cancelled'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Download all per-model log artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/logs-staging
          pattern: logs-*-${{ github.run_id }}
          merge-multiple: false

      - name: Copy artifact contents into logs/<model_id>/
        run: |
          set -e
          if [ ! -d /tmp/logs-staging ]; then
            echo "No artifacts downloaded — nothing to commit."
            exit 0
          fi
          for dir in /tmp/logs-staging/logs-*; do
            [ -d "$dir" ] || continue
            artifact_name=$(basename "$dir")
            # name pattern: logs-<model_id>-<run_id>
            model_id=$(echo "$artifact_name" | sed -E 's/^logs-(.+)-[0-9]+$/\1/')
            echo "Copying $artifact_name → logs/$model_id/"
            mkdir -p "logs/$model_id"
            cp -r "$dir/." "logs/$model_id/"
          done

      - name: Commit & push
        run: |
          git config user.name  "BR-PPO Trader Bot"
          git config user.email "bot@brppo-trading.local"
          git add logs/
          if git diff --staged --quiet; then
            echo "No log changes to commit."
          else
            git commit -m "📊 Trading logs — $(date -u '+%Y-%m-%d %H:%M UTC')"
            git pull --rebase origin main || true
            git push
          fi
