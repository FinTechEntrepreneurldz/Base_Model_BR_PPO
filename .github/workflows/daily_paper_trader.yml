name: Daily Paper Trader

on:
  schedule:
    - cron: "0 13 * * 1-5"   # Mon–Fri 13:00 UTC = 9:00 AM ET
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (do NOT submit orders)"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  trade:
    name: BR-PPO Paper Trade
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -q -r requirements.txt

      - name: Check if today is a trading day
        id: market_check
        run: python scripts/market_check.py --info
        continue-on-error: true

      - name: Skip on non-trading day
        if: steps.market_check.outcome == 'failure'
        run: |
          echo "Today is not a NYSE trading day. Skipping."
          exit 0

      - name: Run BR-PPO paper trader
        env:
          ALPACA_API_KEY:                   ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY:                ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_PAPER:                     "True"
          BRPPO_SUBMIT_ORDERS:              ${{ github.event.inputs.dry_run == 'true' && 'False' || 'True' }}
          BRPPO_PROJECT_ROOT:               "."
          BRPPO_MODEL_PATH:                 "./artifacts/v10_bro_ppo_allocation_agent.zip"
          BRPPO_METADATA_PATH:              "./artifacts/v10_bro_ppo_allocation_agent_metadata.json"
          BRPPO_MIN_TRADE_DOLLARS:          "25"
          BRPPO_MAX_POSITION_WEIGHT:        "0.20"
          BRPPO_MAX_GROSS_EXPOSURE:         "1.00"
          BRPPO_CASH_BUFFER_PCT:            "0.02"
          BRPPO_REBALANCE_THRESHOLD_WEIGHT: "0.005"
          BRPPO_DATA_PERIOD:                "3y"
          BRPPO_V6_MAX_NAMES:               "30"
        run: python paper_trader.py

      - name: Commit trading logs
        run: |
          git config user.name  "BR-PPO Trader Bot"
          git config user.email "bot@brppo-trading.local"
          git add logs/
          if git diff --staged --quiet; then
            echo "No log changes to commit."
          else
            git commit -m "📊 Trading log — $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi

      - name: Upload logs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trading-logs-${{ github.run_id }}
          path: logs/
          retention-days: 90
