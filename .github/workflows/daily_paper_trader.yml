name: Daily Paper Trader

on:
  schedule:
    - cron: "0 13 * * 1-5"   # Mon–Fri 13:00 UTC = 9:00 AM ET
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (do NOT submit orders)"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

permissions:
  contents: write
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  trade:
    name: BR-PPO Paper Trade
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -q -r requirements.txt

      - name: Check if today is a trading day
        id: market_check
        run: python scripts/market_check.py --info
        continue-on-error: true

      - name: Skip on non-trading day
        if: steps.market_check.outcome == 'failure'
        run: |
          echo "Today is not a NYSE trading day. Skipping."
          exit 0

      - name: Run BR-PPO paper trader
        env:
          ALPACA_API_KEY:                   ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY:                ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_PAPER:                     "True"
          BRPPO_SUBMIT_ORDERS:              ${{ github.event.inputs.dry_run == 'true' && 'False' || 'True' }}
          BRPPO_PROJECT_ROOT:               "."
          BRPPO_MODEL_PATH:                 "./artifacts/v10_bro_ppo_allocation_agent.zip"
          BRPPO_METADATA_PATH:              "./artifacts/v10_bro_ppo_allocation_agent_metadata.json"
          BRPPO_MIN_TRADE_DOLLARS:          "25"
          BRPPO_MAX_POSITION_WEIGHT:        "0.20"
          BRPPO_MAX_GROSS_EXPOSURE:         "1.00"
          BRPPO_CASH_BUFFER_PCT:            "0.02"
          BRPPO_REBALANCE_THRESHOLD_WEIGHT: "0.005"
          BRPPO_DATA_PERIOD:                "3y"
          BRPPO_V6_MAX_NAMES:               "30"
        run: python paper_trader.py

      - name: Run signal monitor (quick daily check)
        id: health
        run: |
          pip install -q yfinance 2>/dev/null || true
          python scripts/signal_monitor.py --days 63 2>&1 || true
          if [ -f logs/health/health_status.json ]; then
            STATUS=$(python3 -c "import json; d=json.load(open('logs/health/health_status.json')); print(d.get('overall_status','unknown'))")
            TRAINING=$(python3 -c "import json; d=json.load(open('logs/health/health_status.json')); print('1' if d.get('training_recommended') else '0')")
          else
            STATUS="unknown"; TRAINING="0"
          fi
          echo "health_status=$STATUS" >> $GITHUB_OUTPUT
          echo "training_recommended=$TRAINING" >> $GITHUB_OUTPUT
          echo "Daily health check: $STATUS (training_recommended=$TRAINING)"

      - name: Auto-create issue if degraded
        if: steps.health.outputs.health_status == 'degraded'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            const fs = require('fs');
            let healthData = {};
            try { healthData = JSON.parse(fs.readFileSync('logs/health/health_status.json', 'utf8')); } catch(e) {}
            const alerts = (healthData.alerts || []).map(a => `- ⚠️ ${a}`).join('\n') || '_(none)_';
            const openIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo, state: 'open', labels: 'model-health',
            });
            if (!openIssues.data.find(i => i.title.includes('BR-PPO Model Health'))) {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title: `🚨 BR-PPO Model Health: DEGRADED — Retraining needed`,
                body: `## Model Health Alert\n\n**Status:** DEGRADED\n\n**Alerts:**\n${alerts}\n\n**Action required:** Please retrain the BR-PPO model. See the Model Health tab in your Streamlit dashboard for details.\n\n*Auto-created by daily trading workflow.*`,
                labels: ['model-health', 'automated'],
              });
            }

      - name: Commit trading logs
        run: |
          git config user.name  "BR-PPO Trader Bot"
          git config user.email "bot@brppo-trading.local"
          git add logs/
          if git diff --staged --quiet; then
            echo "No log changes to commit."
          else
            git commit -m "📊 Trading log — $(date -u '+%Y-%m-%d %H:%M UTC') [health: ${{ steps.health.outputs.health_status }}]"
            git push
          fi

      - name: Upload logs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trading-logs-${{ github.run_id }}
          path: logs/
          retention-days: 90
