name: Decision Change Email Alerts

on:
  workflow_dispatch:
  schedule:
    # Morning check after most equity workflows finish
    - cron: "30 14 * * 1-5"

    # Afternoon check after crypto / late workflows finish
    - cron: "30 21 * * 1-5"

permissions:
  contents: write

jobs:
  decision-alerts:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Run decision change alert monitor
        env:
          GITHUB_READ_TOKEN: ${{ secrets.GITHUB_READ_TOKEN }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          ALERT_EMAIL_FROM: ${{ secrets.ALERT_EMAIL_FROM }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
          SEND_ON_INITIAL_BASELINE: "false"
        run: python scripts/decision_change_alerts.py

      - name: Commit alert state
        if: always()
        run: |
          git config user.name "qsentia-alert-bot"
          git config user.email "qsentia-alert-bot@users.noreply.github.com"
          git add logs/alerts/decision_state.json
          if git diff --staged --quiet; then
            echo "No alert state changes to commit."
          else
            git commit -m "Update decision alert state"
            git pull --rebase origin main || true
            git push
          fi
