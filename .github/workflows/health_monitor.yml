name: Model Health Monitor

on:
  schedule:
    - cron: '0 21 * * 5'   # Fridays 21:00 UTC = 5:00 PM ET (post-close)
  workflow_dispatch:
    inputs:
      create_issue_on_warning:
        description: "Create issue even on warning"
        required: false
        default: "false"

permissions:
  contents: read
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  setup:
    name: Build model matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
      count:  ${{ steps.set.outputs.count }}
    steps:
      - uses: actions/checkout@v4
      - run: pip install -q pyyaml
      - id: set
        run: |
          python - <<'PY' >> $GITHUB_OUTPUT
          import yaml, json
          with open("models.yaml") as f:
              data = yaml.safe_load(f)
          enabled = [m for m in data["models"] if m.get("enabled", True)]
          rows = [{"id": m["id"]} for m in enabled]
          print(f"matrix={json.dumps({'include': rows})}")
          print(f"count={len(rows)}")
          PY

  health_check:
    name: Health check ${{ matrix.id }}
    needs: setup
    if: needs.setup.outputs.count != '0'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -q yfinance pandas numpy

      - name: Run signal monitor for ${{ matrix.id }}
        id: monitor
        run: |
          python scripts/signal_monitor.py --model-id ${{ matrix.id }} --days 63 2>&1 | tee /tmp/health_output.txt
          STATUS_FILE="logs/${{ matrix.id }}/health/health_status.json"
          if [ -f "$STATUS_FILE" ]; then
            STATUS=$(python3 -c "import json; print(json.load(open('$STATUS_FILE')).get('overall_status','unknown'))")
            TRAINING=$(python3 -c "import json; print('1' if json.load(open('$STATUS_FILE')).get('training_recommended') else '0')")
          else
            STATUS="unknown"; TRAINING="0"
          fi
          echo "health_status=$STATUS" >> $GITHUB_OUTPUT
          echo "training_recommended=$TRAINING" >> $GITHUB_OUTPUT
          echo "[${{ matrix.id }}] $STATUS  retrain=$TRAINING"

      - name: Build issue body
        if: steps.monitor.outputs.health_status == 'degraded' || (github.event.inputs.create_issue_on_warning == 'true' && steps.monitor.outputs.health_status == 'warning')
        run: |
          STATUS_FILE="logs/${{ matrix.id }}/health/health_status.json"
          python3 - <<PY > /tmp/issue_body.md
          import json
          d = json.load(open("$STATUS_FILE"))
          status = d.get("overall_status", "unknown").upper()
          alerts = d.get("alerts", [])
          alerts_md = "\n".join(f"- ⚠️ {a}" for a in alerts) if alerts else "_(none)_"
          ent  = d.get("action_entropy")
          psh  = d.get("portfolio_sharpe_30d")
          ssh  = d.get("spy_sharpe_30d")
          print(f"""## Weekly Health Check — \`${{ matrix.id }}\`

          **Status:** {status}
          **Action Entropy (30d):** {ent if ent is None else round(ent, 3)}
          **Portfolio Sharpe (30d):** {psh if psh is None else round(psh, 3)}
          **SPY Sharpe (30d):** {ssh if ssh is None else round(ssh, 3)}

          **Alerts:**
          {alerts_md}

          **Recommendation:** {'Retrain this model now.' if d.get('training_recommended') else 'Continue monitoring.'}

          **Retrain steps for \`${{ matrix.id }}\`:**
          1. Open \`vision_ichimoku_agentic.py\` in Colab
          2. Update \`CONFIG\` train/validation/test dates (roll forward)
          3. Run all cells
          4. Replace \`artifacts/${{ matrix.id }}/agent.zip\` + \`metadata.json\`
          5. Push to main

          *Auto-created by weekly health monitor.*
          """)
          PY

      - name: Create / update issue (per-model)
        if: steps.monitor.outputs.health_status == 'degraded' || (github.event.inputs.create_issue_on_warning == 'true' && steps.monitor.outputs.health_status == 'warning')
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('/tmp/issue_body.md', 'utf8');
            const modelId = '${{ matrix.id }}';
            const titleTag = `BR-PPO Health [${modelId}]`;
            const open = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: 'model-health',
            });
            const existing = open.data.find(i => i.title.includes(titleTag));
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: existing.number,
                body: body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title: `🚨 ${titleTag} — ${'${{ steps.monitor.outputs.health_status }}'.toUpperCase()}`,
                body: body,
                labels: ['model-health', 'automated', `model:${modelId}`],
              });
            }
