name: Central health monitor

# Runs daily at 15:00 UTC (after the daily traders finish around 14:00 UTC)
# and computes health for ALL models from a single point of authority.
on:
  schedule:
    - cron: "0 15 * * 1-5"
  workflow_dispatch:
    inputs:
      lookback_days:
        description: "Lookback window in days"
        default: "63"
        required: false
      only_model:
        description: "Only compute health for this model_id (blank = all)"
        default: ""
        required: false

permissions:
  contents: write
  issues:   write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -q pandas numpy pyyaml requests yfinance

      - name: Run central health monitor
        env:
          LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days || '63' }}
          ONLY_MODEL:    ${{ github.event.inputs.only_model    || ''   }}
        run: |
          ARGS=("--lookback-days" "${LOOKBACK_DAYS}")
          if [ -n "${ONLY_MODEL}" ]; then
            ARGS+=("--only-model" "${ONLY_MODEL}")
          fi
          python scripts/central_health_monitor.py "${ARGS[@]}" || EXIT=$?
          # Capture exit code but do not fail the job on degraded status — we
          # want the commit-and-push step to still run.
          echo "MONITOR_EXIT=${EXIT:-0}" >> $GITHUB_ENV

      - name: Commit updated health JSONs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logs/*/health/health_status.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No health changes to commit."
          else
            STAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "🩺 Central health refresh — ${STAMP}"
            git push
          fi

      - name: Surface degraded status to workflow result
        if: env.MONITOR_EXIT != '0'
        run: |
          echo "::warning::One or more models flagged as degraded; see commit logs."
          # Don't actually fail the workflow — we just want a yellow warning,
          # the dashboard will render the red status itself.
