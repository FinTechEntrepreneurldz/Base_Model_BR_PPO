# Model Registry — central dashboard source of truth
# ============================================================
# Each enabled model is rendered as a tab in streamlit_app.py.
# The dashboard reads each model's logs from a raw GitHub URL
# constructed as:
#   https://raw.githubusercontent.com/{repo}/{branch}/{logs_path}/<file>
#
# Models can live in their own repos (separate Alpaca accounts,
# separate workflows, separate concerns). The dashboard pulls
# the latest committed CSVs from each.
#
# Required fields per model:
#   id          short slug used in URLs and selector
#   name        human label
#   repo        "owner/repo" — must be public for unauthenticated raw reads
#   logs_path   path to the logs/ directory inside that repo
#   branch      branch to read from (usually "main")
#   color       accent color for charts
#   enabled     show in dashboard (set false to hide without deleting)
#
# Optional:
#   description short paragraph shown in the model header
#   environment legacy — only used when running matrix CI in this repo
#
# To add a new model:
#   1) Spin up its own repo with a paper_trader.py that writes the
#      canonical log schema (see Model_B_Paper_Trading for the template).
#   2) Wire its own Alpaca paper account + GitHub Actions workflow.
#   3) Add an entry below with enabled: true. Push to main.
#   4) Streamlit Cloud auto-redeploys; the new model appears in the selector.
# ============================================================

models:
  - id: model_a
    name: "BR-PPO V10 (original)"
    description: "PPO allocation agent trained 2015-2018. First deployed model."
    repo: "FinTechEntrepreneurldz/Base_Model_BR_PPO"
    logs_path: "logs/model_a"
    branch: "main"
    environment: model_a
    enabled: true
    color: "#00d4aa"

  - id: model_b
    name: "MLP_alpha 130/30"
    description: "Sector-neutral 130/30 score-map. Test Sharpe 1.89 (2025-10-01+)."
    repo: "FinTechEntrepreneurldz/Model_B_Paper_Trading"
    logs_path: "logs"
    branch: "main"
    enabled: true
    color: "#ff6b00"

  - id: model_c
    name: "MLP_alpha 130/30 (v3 LLM-augmented features)"
    description: "Sector-neutral 130/30 from quarterly_pipeline_llm. Test Sharpe 2.18 (146d OOS, t-stat 1.66)."
    repo: "FinTechEntrepreneurldz/Model_C_Paper_Trading"
    logs_path: "logs"
    branch: "main"
    enabled: true
    color: "#a855f7"
  - id: model_d
    name: "MLP_alpha 130/30 (v4 sharpe3_upgrade)"
    description: "Sector-neutral 130/30 from quarterly_pipeline_sharpe3_upgrade BEST_MODEL. Test Sharpe 2.02 (147d OOS, t-stat 1.55). Architecturally identical to Model C with newer training cut — high position correlation expected."
    repo: "FinTechEntrepreneurldz/Model_D_Paper_Trading"
    logs_path: "logs"
    branch: "main"
    enabled: true
    color: "#3b82f6"
  - id: model_e
    name: "BR-PPO V10B Ensemble (Phase 1: disabled)"
    description: "3-member weighted PPO ensemble (0.50/0.33/0.17) over 23-action discrete allocator. Test Sharpe 1.69, t-stat 1.29 (147d OOS), max DD -8.5%. Beats all 6 equity benchmarks. PHASE 1 STATUS: deployed in disabled mode (heartbeat only). Will not trade until Phase 2 alpha feeders are wired."
    repo: "FinTechEntrepreneurldz/Model_E_Paper_Trading"
    logs_path: "logs"
    branch: "main"
    enabled: true
    color: "#ec4899"
